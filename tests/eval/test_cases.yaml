# emojify evaluation dataset — 50 test cases
# Scoring: 3 (perfect), 2 (reasonable), 1 (miss)
#
# text_to_emoji: 30 cases across 10 categories (3 per category)
# emoji_to_text: 20 cases across 10 categories (2 per category)

text_to_emoji:
  # --- greeting (3 cases) ---
  - input_text: "happy birthday"
    expected_emoji: ["🎂", "🎉", "🥳"]
    category: greeting

  - input_text: "good morning"
    expected_emoji: ["☀️", "🌅", "🌞"]
